<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Photo Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="photo-container">
            <img id="random-photo" src="" alt="Random photo from the web">
            <div id="loading">Loading...</div>
        </div>
        <button id="refresh-button" class="rainbow-3d-button">Click to refresh for a new picture</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
